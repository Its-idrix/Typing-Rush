<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRush Pro</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --caret-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Top Config Dashboard: Best Score & Difficulty Controls */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            gap: 1rem;
        }

        .best-score-badge {
            font-size: 1.1rem;
            color: var(--text-color);
        }
        .best-score-badge span {
            color: var(--main-color);
            font-weight: bold;
        }

        .difficulty-container button {
            background: transparent;
            border: none;
            color: var(--sub-color);
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            padding: 0.2rem 0.6rem;
            transition: color 0.2s ease;
        }
        .difficulty-container button.active {
            color: var(--main-color);
            font-weight: bold;
        }

        /* Real-time stats row */
        #stats-container {
            display: flex;
            justify-content: center;
            gap: 3rem;
            font-size: 1.5rem;
            color: var(--sub-color);
        }
        .stat .highlight {
            color: var(--main-color);
            font-weight: bold;
        }

        #words-wrapper {
            position: relative;
            font-size: 1.8rem;
            line-height: 2.6rem;
            min-height: 120px;
            word-break: break-word;
            text-align: left;
            user-select: none;
            outline: none;
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        .char {
            color: var(--sub-color);
            position: relative;
        }
        .char.correct {
            color: var(--text-color);
        }
        .char.incorrect {
            color: var(--error-color);
            background-color: rgba(202, 71, 84, 0.15);
        }

        /* Caret Line styling */
        .char.current::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 2px;
            height: 100%;
            background-color: var(--caret-color);
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* End Screen Grid Container */
        #results {
            display: none;
            background: rgba(0, 0, 0, 0.25);
            padding: 2rem;
            border-radius: 8px;
        }
        #results h2 {
            color: var(--main-color);
            margin-top: 0;
            font-size: 2rem;
        }
        .results-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1.5rem;
            font-size: 1.6rem;
        }

        #restart-btn {
            background-color: transparent;
            border: 2px solid var(--sub-color);
            color: var(--sub-color);
            padding: 0.6rem 2rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            align-self: center;
            transition: all 0.2s ease;
        }
        #restart-btn:hover {
            color: var(--bg-color);
            background-color: var(--text-color);
            border-color: var(--text-color);
        }

        /* Responsive Breakpoints */
        @media (max-width: 600px) {
            #words-wrapper { font-size: 1.4rem; line-height: 2.1rem; min-height: 90px; }
            #stats-container { font-size: 1.2rem; gap: 1.5rem; }
            .dashboard { flex-direction: column; text-align: center; }
            .results-grid { flex-direction: column; font-size: 1.3rem; gap: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard">
            <div class="best-score-badge">
                Personal Best (<span id="pb-diff-label">Easy</span>): <span id="pb-display">0 WPM</span>
            </div>
            <div class="difficulty-container">
                <button id="btn-easy" class="active" onclick="changeDifficulty('easy')">Easy</button>
                <button id="btn-medium" onclick="changeDifficulty('medium')">Medium</button>
                <button id="btn-hard" onclick="changeDifficulty('hard')">Hard</button>
            </div>
        </div>

        <div id="stats-container">
            <div class="stat">Timer: <span id="live-timer" class="highlight">0.0s</span></div>
            <div class="stat">Live WPM: <span id="live-wpm" class="highlight">0</span></div>
        </div>

        <input type="text" id="hidden-input" autofocus autocomplete="off" autocapitalize="none">
        <div id="words-wrapper"></div>

        <div id="results">
            <h2>Round Finished!</h2>
            <div class="results-grid">
                <div>WPM: <span id="res-wpm" style="color: var(--main-color);">0</span></div>
                <div>Accuracy: <span id="res-acc" style="color: var(--main-color);">0%</span></div>
                <div>Time: <span id="res-time" style="color: var(--main-color);">0s</span></div>
            </div>
        </div>

        <button id="restart-btn">Restart (or press Enter)</button>
    </div>

    <script>
        // Divided Library Lists (30-120 Characters)
        const difficultyLibraries = {
            easy: [
                "The quick brown fox jumps over the lazy dog.",
                "Simplicity is the soul of efficiency.",
                "Fix the cause, not the symptom.",
                "Cats are small animals with soft fur.",
                "The sun rises in the east and sets down."
            ],
            medium: [
                "Code is like humor. When you have to explain it, it is bad.",
                "Before software can be reusable it first has to be usable.",
                "Continuous improvement is better than delayed perfection.",
                "JavaScript is a versatile programming language for web apps.",
                "Stay hungry. Stay foolish. Never look back."
            ],
            hard: [
                "API requests initialized via AJAX workflows optimize real-time calculations.",
                "Polymorphism & asynchronous closures challenge entry-level architecture.",
                "Debugging architectural multithreading sync systems requires deep patience.",
                "Refactoring complex object-oriented structural frameworks eliminates technical debt.",
                "The system algorithm dynamically computed multi-layered cryptography parameters."
            ]
        };

        let currentDifficulty = "easy";
        let currentText = "";
        let startTime = null;
        let timerInterval = null;
        let isTracking = false;
        let totalErrors = 0;
        let totalTyped = 0;

        const wordsWrapper = document.getElementById('words-wrapper');
        const hiddenInput = document.getElementById('hidden-input');
        const liveTimer = document.getElementById('live-timer');
        const liveWpm = document.getElementById('live-wpm');
        const resultsDiv = document.getElementById('results');
        const resWpm = document.getElementById('res-wpm');
        const resAcc = document.getElementById('res-acc');
        const resTime = document.getElementById('res-time');
        const restartBtn = document.getElementById('restart-btn');
        const pbDisplay = document.getElementById('pb-display');
        const pbDiffLabel = document.getElementById('pb-diff-label');

        // High Score Processing System
        function updateHighScoreDisplay() {
            const savedPB = localStorage.getItem(`typerush_pb_${currentDifficulty}`) || 0;
            pbDiffLabel.innerText = currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
            pbDisplay.innerText = `${savedPB} WPM`;
        }

        function saveHighScore(finalWpm) {
            const currentPB = parseInt(localStorage.getItem(`typerush_pb_${currentDifficulty}`)) || 0;
            if (finalWpm > currentPB) {
                localStorage.setItem(`typerush_pb_${currentDifficulty}`, finalWpm);
                updateHighScoreDisplay();
            }
        }

        function changeDifficulty(level) {
            currentDifficulty = level;
            document.querySelectorAll('.difficulty-container button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            updateHighScoreDisplay();
            initGame();
        }

        function initGame() {
            clearInterval(timerInterval);
            timerInterval = null;
            startTime = null;
            isTracking = false;
            totalErrors = 0;
            totalTyped = 0;
            
            liveTimer.innerText = "0.0s";
            liveWpm.innerText = "0";
            resultsDiv.style.display = "none";
            wordsWrapper.style.display = "block";
            hiddenInput.value = "";
            hiddenInput.disabled = false;

            const targetLib = difficultyLibraries[currentDifficulty];
            const randomIndex = Math.floor(Math.random() * targetLib.length);
            currentText = targetLib[randomIndex];

            wordsWrapper.innerHTML = currentText.split('').map((char, index) => {
                const currentClass = index === 0 ? 'char current' : 'char';
                return `<span class="${currentClass}">${char}</span>`;
            }).join('');

            hiddenInput.focus();
        }

        window.addEventListener('click', () => hiddenInput.focus());

        hiddenInput.addEventListener('input', (e) => {
            const inputValue = hiddenInput.value;
            const inputLength = inputValue.length;
            const textSpans = wordsWrapper.querySelectorAll('.char');

            if (!isTracking && inputLength > 0) {
                isTracking = true;
                startTime = performance.now();
                timerInterval = setInterval(updateStats, 100);
            }

            totalTyped++;

            textSpans.forEach((span, index) => {
                span.classList.remove('current', 'correct', 'incorrect');

                if (index < inputLength) {
                    if (inputValue[index] === currentText[index]) {
                        span.classList.add('correct');
                    } else {
                        span.classList.add('incorrect');
                        if (index === inputLength - 1 && e.inputType !== "deleteContentBackward") {
                            totalErrors++;
                        }
                    }
                }

                if (index === inputLength) {
                    span.classList.add('current');
                }
            });

            if (inputLength >= currentText.length) {
                endGame();
            }
        });

        function updateStats() {
            if (!startTime) return;
            const currentTime = performance.now();
            const timeElapsed = (currentTime - startTime) / 1000;
            liveTimer.innerText = `${timeElapsed.toFixed(1)}s`;

            const correctChars = wordsWrapper.querySelectorAll('.char.correct').length;
            const minutes = timeElapsed / 60;
            if (minutes > 0) {
                const wpm = Math.round((correctChars / 5) / minutes);
                liveWpm.innerText = wpm;
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            hiddenInput.disabled = true;

            const endTime = performance.now();
            const finalTimeSeconds = ((endTime - startTime) / 1000).toFixed(2);
            
            const correctChars = wordsWrapper.querySelectorAll('.char.correct').length;
            const finalWpm = Math.round((correctChars / 5) / (finalTimeSeconds / 60));
            const accuracy = Math.max(0, Math.round((correctChars / currentText.length) * 100));

            wordsWrapper.style.display = "none";
            resWpm.innerText = finalWpm;
            resAcc.innerText = `${accuracy}%`;
            resTime.innerText = `${finalTimeSeconds}s`;
            resultsDiv.style.display = "block";

            // Process and commit to database if it beats old high score
            saveHighScore(finalWpm);
        }

        restartBtn.addEventListener('click', initGame);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                initGame();
            }
        });

        // Initialize display and setup the base layout
        updateHighScoreDisplay();
        initGame();
    </script>
</body>
</html>
